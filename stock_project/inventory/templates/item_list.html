{% extends "base.html" %}
{% block title %}Items{% endblock %}
{% block content %}
<h2>Items</h2>
<table>
  <thead><tr><th>Name</th><th>SKU</th><th>Qty</th><th>Price</th><th></th></tr></thead>
  <tbody>
    {% for item in items %}
      <tr>
        <td><a href="{% url 'inventory:item_detail' item.pk %}">{{ item.name }}</a></td>
        <td>{{ item.sku }}</td>
        <td>{{ item.quantity }}</td>
        <td>{{ item.price }}</td>
        <td class="actions">
          {% if user.is_staff %}
            <a class="btn" href="{% url 'inventory:item_update' item.pk %}">Edit</a>
            <a class="btn" href="{% url 'inventory:item_delete' item.pk %}">Delete</a>
          {% endif %}
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="5">No items yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
