{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Stock System</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<h2>Login</h2>

<!-- Login form -->
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>

<!-- Link to signup -->
<p style="text-align:center;">
    Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
</p>

</body>
</html>
